<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Login - Immogucker</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"
        />
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }
            article {
                width: 100%;
                max-width: 400px;
            }
            .error-message {
                color: #d0021b;
                font-size: 0.9em;
                margin-bottom: 1rem;
                text-align: center;
            }
            .success-message {
                color: #7ed321;
                font-size: 0.9em;
                margin-bottom: 1rem;
                text-align: center;
                background-color: rgba(126, 211, 33, 0.1);
                padding: 0.5rem;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <main class="container">
            <article>
                <hgroup>
                    <h2>Welcome Back</h2>
                    <h3>Log in to Immogucker</h3>
                </hgroup>

                {{ if .Message }}
                <div class="success-message">{{ .Message }}</div>
                {{ end }}

                <div id="login-error" class="error-message"></div>

                <form
                    hx-post="/api/v1/auth/login"
                    hx-target="#login-error"
                    hx-swap="innerHTML"
                >
                    <input
                        type="email"
                        name="email"
                        placeholder="Email address"
                        required
                    />
                    <input
                        type="password"
                        name="password"
                        placeholder="Password"
                        required
                    />
                    <button type="submit">Log in</button>
                </form>
                <small
                    >Don't have an account?
                    <a href="/register">Sign up</a></small
                >
            </article>
        </main>
    </body>
</html>
