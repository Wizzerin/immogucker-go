services:
  # Go microservice
  api:
    build: .
    container_name: immogucker_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/v1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    env_file:
      - .env
    environment:
      # Override the database URL to work within the Docker network
      - DATABASE_URL=postgres://ig_user:ig_secret_password@immogucker_pg_db:5432/immogucker_db?sslmode=disable

  db:
    image: postgres:15-alpine
    container_name: immogucker_pg_db
    restart: always
    environment:
      POSTGRES_USER: ig_user
      POSTGRES_PASSWORD: ig_secret_password
      POSTGRES_DB: immogucker_db
    ports:
      # Host port (on your PC) : Container port (inside the container)
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
